<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Consciousness</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Courier New', Consolas, Monaco, monospace;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      white-space: pre;
      line-height: 1.2;
      font-size: clamp(9px, 1.2vw, 14px);
      color: #000000;
      user-select: none;
      cursor: crosshair;
    }

    #webcam-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 180px;
      border: 2px solid #000;
      background: #000;
      z-index: 1000;
      opacity: 0.85;
    }

    #webcam-container.hidden {
      display: none;
    }

    #webcam {
      width: 100%;
      height: auto;
      display: block;
    }

    #toggle-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      background: #fff;
      border: 2px solid #000;
      cursor: pointer;
      font-size: 16px;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #toggle-btn.active {
      background: #000;
      color: #fff;
    }

    #overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 13px;
      color: #333;
      background: rgba(255,255,255,0.95);
      padding: 10px 16px;
      border: 1px solid #ccc;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="overlay">Click to enable webcam</div>
  <button id="toggle-btn">📷</button>
  <div id="webcam-container" class="hidden">
    <video id="webcam" autoplay playsinline muted></video>
  </div>
  <div id="canvas"></div>

  <script>
    // ========================================
    // CONFIG
    // ========================================
    const CONFIG = {
      cols: 100,
      rows: 55,
      baseSpeed: 0.4,          // Slow base movement
      trackSpeed: 1.2,         // Faster when tracking
      turnRate: 0.04,          // Smooth turning
      wobbleAmount: 0.08,      // Gentle wobble
      branchChance: 0.03,       // Low branching
      maxFibers: 15,           // Limited fibers
      trailLength: 25,          // Longer trails
      lineFadeSpeed: 0.015,    // Slow fade
      motionThreshold: 20,
      sensorSize: 14           // Larger detection blocks
    };

    // ASCII characters - elegant set
    const CHARS = {
      tip: ['✦', '✧', '∗', '•', '◦', '∘'],
      node: ['○', '◌', '◎', '●'],
      line: ['─', '│', '┌', '┐', '└', '┘', '├', '┤', '┬', '┴', '┼', '─', '│'],
      trail: ['·', '∙', '◦', '・'],
      motion: ['◉', '◎', '○']
    };

    // ========================================
    // STATE
    // ========================================
    let fibers = [];           // Growing fiber tips
    let nodes = [];            // Established nodes/joints
    let connections = [];      // Lines between nodes
    let trails = [];           // Trail points
    let motionTarget = null;   // Current motion center
    let motionIntensity = 0;
    let webcamReady = false;
    let lastFrame = null;
    let hiddenCanvas, hiddenCtx;

    // ========================================
    // DOM
    // ========================================
    const canvas = document.getElementById('canvas');
    const webcam = document.getElementById('webcam');
    const overlay = document.getElementById('overlay');
    const toggleBtn = document.getElementById('toggle-btn');
    const webcamContainer = document.getElementById('webcam-container');

    // ========================================
    // WEBCAM
    // ========================================
    toggleBtn.addEventListener('click', () => {
      webcamContainer.classList.toggle('hidden');
      toggleBtn.classList.toggle('active');
    });

    async function initWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 320, height: 240 }
        });
        webcam.srcObject = stream;
        await webcam.play();

        hiddenCanvas = document.createElement('canvas');
        hiddenCanvas.width = 80;
        hiddenCanvas.height = 60;
        hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

        webcamReady = true;
        overlay.textContent = 'Move slowly to grow fibers';
        toggleBtn.classList.add('active');
        return true;
      } catch (e) {
        overlay.textContent = 'Webcam unavailable';
        return false;
      }
    }

    function detectMotion() {
      if (!webcamReady || webcam.readyState < 2) return;

      hiddenCtx.drawImage(webcam, 0, 0, 80, 60);
      const frame = hiddenCtx.getImageData(0, 0, 80, 60);
      const data = frame.data;

      if (!lastFrame) {
        lastFrame = new Uint8Array(data.length);
        lastFrame.set(data);
        return;
      }

      let totalMotion = 0;
      let motionX = 0;
      let motionY = 0;
      let count = 0;

      const block = CONFIG.sensorSize;

      for (let by = 0; by < 60; by += block) {
        for (let bx = 0; bx < 80; bx += block) {
          let blockMotion = 0;

          for (let y = by; y < by + block && y < 60; y++) {
            for (let x = bx; x < bx + block && x < 80; x++) {
              const i = (y * 80 + x) * 4;
              const diff = Math.abs(data[i] - lastFrame[i]) +
                          Math.abs(data[i+1] - lastFrame[i+1]) +
                          Math.abs(data[i+2] - lastFrame[i+2]);
              blockMotion += diff;
            }
          }

          if (blockMotion > CONFIG.motionThreshold * 10) {
            motionX += bx;
            motionY += by;
            count++;
            totalMotion += blockMotion;
          }
        }
      }

      lastFrame.set(data);

      // Smooth motion intensity
      if (totalMotion > 0 && count > 0) {
        const targetX = (motionX / count) / 80 * CONFIG.cols;
        const targetY = (motionY / count) / 60 * CONFIG.rows;

        if (motionTarget) {
          motionTarget.x += (targetX - motionTarget.x) * 0.3;
          motionTarget.y += (targetY - motionTarget.y) * 0.3;
        } else {
          motionTarget = { x: targetX, y: targetY };
        }

        motionIntensity = Math.min(1, motionIntensity + 0.15);
      } else {
        motionIntensity = Math.max(0, motionIntensity - 0.02);
      }
    }

    // ========================================
    // FIBER (Growing tip)
    // ========================================
    class Fiber {
      constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.speed = CONFIG.baseSpeed;
        this.trail = [];
        this.age = 0;
        this.maturity = 0;
        this.connected = false;
        this.running = false;  // Is actively tracking
      }

      update() {
        this.age++;
        this.maturity += 0.003;

        // Store trail
        this.trail.push({ x: this.x, y: this.y, age: 0 });
        if (this.trail.length > CONFIG.trailLength) {
          this.trail.shift();
        }
        for (const t of this.trail) t.age++;

        // Determine speed based on tracking
        let targetSpeed = CONFIG.baseSpeed;
        let isRunning = false;

        if (motionTarget && motionIntensity > 0.1) {
          const dx = motionTarget.x - this.x;
          const dy = motionTarget.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 30) {
            targetSpeed = CONFIG.trackSpeed;
            isRunning = true;
          }
        }

        this.running = isRunning;
        this.speed += (targetSpeed - this.speed) * 0.05;

        // Turn toward motion
        if (motionTarget && motionIntensity > 0.05) {
          const dx = motionTarget.x - this.x;
          const dy = motionTarget.y - this.y;
          const targetAngle = Math.atan2(dy, dx);

          let diff = targetAngle - this.angle;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;

          this.angle += diff * CONFIG.turnRate;
        }

        // Add gentle wobble
        const wobble = Math.sin(this.age * 0.03) * CONFIG.wobbleAmount;
        this.angle += wobble;

        // Move
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Boundary - gentle bounce
        const m = 5;
        if (this.x < m) { this.x = m; this.angle = Math.PI - this.angle + (Math.random() - 0.5) * 0.5; }
        if (this.x > CONFIG.cols - m) { this.x = CONFIG.cols - m; this.angle = Math.PI - this.angle + (Math.random() - 0.5) * 0.5; }
        if (this.y < m) { this.y = m; this.angle = -this.angle + (Math.random() - 0.5) * 0.5; }
        if (this.y > CONFIG.rows - m) { this.y = CONFIG.rows - m; this.angle = -this.angle + (Math.random() - 0.5) * 0.5; }
      }

      isMature() {
        return this.maturity > 1 || this.age > 800;
      }
    }

    // ========================================
    // NODE (Joint)
    // ========================================
    class Node {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.opacity = 0.8;
        this.char = CHARS.node[Math.floor(Math.random() * CHARS.node.length)];
      }
    }

    // ========================================
    // CONNECTION (Line segment)
    // ========================================
    class Connection {
      constructor(x1, y1, x2, y2) {
        this.x1 = x1;
        this.y1 = y1;
        this.x2 = x2;
        this.y2 = y2;
        this.opacity = 0.5;
        this.age = 0;
      }
    }

    // ========================================
    // INIT
    // ========================================
    function init() {
      // Start with a few seed fibers
      const cx = CONFIG.cols / 2;
      const cy = CONFIG.rows / 2;

      const angles = [0, Math.PI * 0.5, Math.PI, Math.PI * 1.5];
      for (const a of angles) {
        fibers.push(new Fiber(cx, cy, a));
      }

      handleResize();
      initWebcam();
      requestAnimationFrame(animate);
    }

    // ========================================
    // UPDATE
    // ========================================
    function update() {
      detectMotion();

      // Update fibers
      for (let i = fibers.length - 1; i >= 0; i--) {
        const f = fibers[i];
        f.update();

        // Mature into node
        if (f.isMature()) {
          nodes.push(new Node(f.x, f.y));

          // Keep a few mature fibers as "living"
          if (fibers.length > 5) {
            fibers.splice(i, 1);
          }
        }

        // Occasional branching
        if (f.age > 100 && f.age % 200 === 0 && fibers.length < CONFIG.maxFibers && Math.random() < CONFIG.branchChance * 10) {
          const branchAngle = f.angle + (Math.random() > 0.5 ? 0.5 : -0.5);
          fibers.push(new Fiber(f.x, f.y, branchAngle));
        }
      }

      // Spawn new fiber from node toward motion
      if (motionTarget && motionIntensity > 0.3 && fibers.length < CONFIG.maxFibers) {
        if (Math.random() < 0.02) {
          // Pick a random existing node
          if (nodes.length > 0) {
            const node = nodes[Math.floor(Math.random() * nodes.length)];
            const angle = Math.atan2(motionTarget.y - node.y, motionTarget.x - node.x);
            fibers.push(new Fiber(node.x, node.y, angle));
          }
        }
      }

      // Keep connections updated between nearby fibers/nodes
      for (const f of fibers) {
        for (const n of nodes) {
          const dx = f.x - n.x;
          const dy = f.y - n.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 8 && dist > 1) {
            // Create connection
            const exists = connections.some(c =>
              (c.x1 === n.x && c.y1 === n.y && c.x2 === f.x && c.y2 === f.y) ||
              (c.x1 === f.x && c.y1 === f.y && c.x2 === n.x && c.y2 === n.y)
            );

            if (!exists) {
              connections.push(new Connection(n.x, n.y, f.x, f.y));
            }
          }
        }
      }

      // Fade connections
      for (let i = connections.length - 1; i >= 0; i--) {
        connections[i].age++;
        connections[i].opacity = Math.max(0.1, 0.5 - connections[i].age * CONFIG.lineFadeSpeed);
        if (connections[i].opacity <= 0.1) {
          connections.splice(i, 1);
        }
      }
    }

    // ========================================
    // RENDER
    // ========================================
    function render() {
      const grid = [];

      for (let y = 0; y < CONFIG.rows; y++) {
        grid[y] = [];
        for (let x = 0; x < CONFIG.cols; x++) {
          grid[y][x] = { char: ' ', opacity: 0, bold: false };
        }
      }

      // Draw connections as lines
      for (const c of connections) {
        const x1 = Math.round(c.x1);
        const y1 = Math.round(c.y1);
        const x2 = Math.round(c.x2);
        const y2 = Math.round(c.y2);

        if (x1 === x2 && y1 >= 0 && y1 < CONFIG.rows && x1 >= 0 && x1 < CONFIG.cols) {
          // Vertical
          const minY = Math.min(y1, y2);
          const maxY = Math.max(y1, y2);
          for (let y = minY; y <= maxY; y++) {
            if (grid[y] && grid[y][x1]) {
              grid[y][x1] = { char: '│', opacity: c.opacity, bold: false };
            }
          }
        } else if (y1 === y2 && x1 >= 0 && x1 < CONFIG.cols && y1 >= 0 && y1 < CONFIG.rows) {
          // Horizontal
          const minX = Math.min(x1, x2);
          const maxX = Math.max(x1, x2);
          for (let x = minX; x <= maxX; x++) {
            if (grid[y1] && grid[y1][x]) {
              grid[y1][x] = { char: '─', opacity: c.opacity, bold: false };
            }
          }
        } else {
          // Diagonal - draw as best effort
          const steps = Math.max(Math.abs(x2-x1), Math.abs(y2-y1));
          for (let s = 0; s <= steps; s++) {
            const t = s / steps;
            const x = Math.round(x1 + (x2-x1) * t);
            const y = Math.round(y1 + (y2-y1) * t);
            if (y >= 0 && y < CONFIG.rows && x >= 0 && x < CONFIG.cols && grid[y]) {
              const char = Math.abs(x2-x1) > Math.abs(y2-y1) ? '─' : '│';
              grid[y][x] = { char, opacity: c.opacity * 0.7, bold: false };
            }
          }
        }
      }

      // Draw trails
      for (const f of fibers) {
        for (const t of f.trail) {
          const x = Math.round(t.x);
          const y = Math.round(t.y);
          if (y >= 0 && y < CONFIG.rows && x >= 0 && x < CONFIG.cols) {
            const fade = 1 - t.age / CONFIG.trailLength;
            const existing = grid[y][x];
            if (existing.opacity < fade * 0.5) {
              const idx = Math.floor(t.age / 5) % CHARS.trail.length;
              grid[y][x] = { char: CHARS.trail[idx], opacity: fade * 0.5, bold: false };
            }
          }
        }
      }

      // Draw nodes
      for (const n of nodes) {
        const x = Math.round(n.x);
        const y = Math.round(n.y);
        if (y >= 0 && y < CONFIG.rows && x >= 0 && x < CONFIG.cols) {
          grid[y][x] = { char: n.char, opacity: n.opacity, bold: false };
        }
      }

      // Draw fiber tips
      for (const f of fibers) {
        const x = Math.round(f.x);
        const y = Math.round(f.y);
        if (y >= 0 && y < CONFIG.rows && x >= 0 && x < CONFIG.cols) {
          const idx = f.age % CHARS.tip.length;
          grid[y][x] = { char: CHARS.tip[idx], opacity: 1, bold: true };
        }
      }

      // Draw motion indicator
      if (motionTarget && motionIntensity > 0.1) {
        const x = Math.round(motionTarget.x);
        const y = Math.round(motionTarget.y);
        if (y >= 0 && y < CONFIG.rows && x >= 0 && x < CONFIG.cols) {
          const idx = Math.floor(Date.now() / 200) % CHARS.motion.length;
          grid[y][x] = { char: CHARS.motion[idx], opacity: motionIntensity, bold: true };
        }
      }

      // Build HTML
      let html = '';
      for (let y = 0; y < CONFIG.rows; y++) {
        for (let x = 0; x < CONFIG.cols; x++) {
          const cell = grid[y][x];
          const gray = Math.round(20 + cell.opacity * 75);
          const weight = cell.bold ? 'font-weight: bold;' : '';
          html += `<span style="color: hsl(0, 0%, ${gray}%); ${weight}">${cell.char}</span>`;
        }
        html += '\n';
      }

      canvas.innerHTML = html;
    }

    // ========================================
    // ANIMATE
    // ========================================
    function animate() {
      update();
      render();
      requestAnimationFrame(animate);
    }

    // ========================================
    // RESIZE
    // ========================================
    function handleResize() {
      const charW = canvas.clientWidth / CONFIG.cols;
      const charH = canvas.clientHeight / CONFIG.rows;
      canvas.style.fontSize = `${Math.min(charW, charH * 1.3)}px`;
    }

    window.addEventListener('resize', handleResize);

    // Click to init webcam
    document.addEventListener('click', () => {
      if (!webcamReady) initWebcam();
    }, { once: true });

    init();
  </script>
</body>
</html>
