<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Consciousness</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Courier New', Consolas, Monaco, monospace;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      white-space: pre;
      line-height: 1.1;
      font-size: clamp(10px, 1.5vw, 16px);
      color: #000000;
      user-select: none;
      cursor: crosshair;
    }

    #webcam-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 200px;
      border: 2px solid #000;
      background: #000;
      z-index: 1000;
      opacity: 0.85;
      transition: opacity 0.3s;
    }

    #webcam-container:hover {
      opacity: 1;
    }

    #webcam-container.hidden {
      display: none;
    }

    #webcam {
      width: 100%;
      height: auto;
      display: block;
    }

    #toggle-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: #fff;
      border: 2px solid #000;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #toggle-btn:hover {
      background: #f0f0f0;
    }

    #toggle-btn.active {
      background: #000;
      color: #fff;
    }

    #overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 12px;
      color: #666;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="overlay">Initializing...</div>

  <button id="toggle-btn" title="Toggle webcam preview">📷</button>

  <div id="webcam-container">
    <video id="webcam" autoplay playsinline muted></video>
  </div>

  <div id="canvas"></div>

  <script>
    // ========================================
    // CONFIGURATION
    // ========================================
    const CONFIG = {
      cols: 90,
      rows: 50,
      growthRate: 2.5,        // Faster growth
      branchProbability: 0.08,
      maxTips: 40,
      maxNodes: 500,
      motionThreshold: 8,      // Lower = more sensitive
      motionSmoothingFrames: 3,
      dormantThreshold: 300,
      ambientDrift: 0.01,
      trailDecay: 0.92,       // Trail persistence
      motionBoost: 2.0        // Speed boost when tracking motion
    };

    const CHARS = {
      dormant: ['.', '·', ':', '˙', ',', '`'],
      established: ['-', '|', '+', '\\', '/', 'x', '=', '~', '^', 'v', '<', '>'],
      active: ['@', '#', '*', '█', '▓', '▒', '◆', '●'],
      junction: ['○', '◉', '◎', '⊕', '⊙', '◈'],
      trail: ['·', '∙', '◦', '•']
    };

    // ========================================
    // STATE
    // ========================================
    let nodes = [];
    let tips = [];
    let motionHistory = [];
    let motionSources = [];
    let frameCount = 0;
    let webcamActive = false;

    // ========================================
    // DOM ELEMENTS
    // ========================================
    const webcamEl = document.getElementById('webcam');
    const canvasEl = document.getElementById('canvas');
    const overlayEl = document.getElementById('overlay');
    const toggleBtn = document.getElementById('toggle-btn');
    const webcamContainer = document.getElementById('webcam-container');

    let hiddenCanvas, hiddenCtx;

    // ========================================
    // TOGGLE WEBCAM PREVIEW
    // ========================================
    toggleBtn.addEventListener('click', () => {
      webcamContainer.classList.toggle('hidden');
      toggleBtn.classList.toggle('active');
    });

    // ========================================
    // NODE CLASS
    // ========================================
    class Node {
      constructor(x, y, isRoot = false) {
        this.x = x;
        this.y = y;
        this.isRoot = isRoot;
        this.dormantFrames = 0;
        this.char = this.randomChar('established');
        this.opacity = 1;
        this.age = 0;
      }

      randomChar(type) {
        const chars = CHARS[type] || CHARS.dormant;
        return chars[Math.floor(Math.random() * chars.length)];
      }

      update() {
        this.age++;
        if (motionSources.length === 0) {
          this.dormantFrames++;
          const fade = Math.min(1, this.dormantFrames / CONFIG.dormantThreshold);
          this.opacity = Math.max(0.25, 1 - fade * 0.75);
          if (this.dormantFrames > 30) {
            this.char = this.randomChar('dormant');
          }
        } else {
          this.dormantFrames = 0;
          this.opacity = Math.min(1, this.opacity + 0.08);
          if (this.age > 80 && this.age % 20 === 0) {
            this.char = this.randomChar('established');
          }
        }
      }
    }

    // ========================================
    // TIP CLASS (Growing neural fiber)
    // ========================================
    class Tip {
      constructor(x, y, angle = null, depth = 0) {
        this.x = x;
        this.y = y;
        this.angle = angle !== null ? angle : Math.random() * Math.PI * 2;
        this.depth = depth;
        this.speed = CONFIG.growthRate * (0.7 + Math.random() * 0.6);
        this.wobbleOffset = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.08 + Math.random() * 0.08;
        this.char = this.randomChar('active');
        this.life = 0;
        this.lastX = x;
        this.lastY = y;
        this.trail = [];  // Store trail positions
      }

      randomChar(type) {
        const chars = CHARS[type] || CHARS.active;
        return chars[Math.floor(Math.random() * chars.length)];
      }

      update() {
        this.life++;

        // Store trail position
        this.trail.push({ x: this.x, y: this.y, age: 0 });
        if (this.trail.length > 20) this.trail.shift();
        for (const t of this.trail) t.age++;

        // Calculate speed - faster when tracking
        let speedMult = 1.0;
        if (motionSources.length > 0) {
          const nearest = this.findNearestMotion();
          if (nearest) {
            const dx = nearest.x - this.x;
            const dy = nearest.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 30) speedMult = CONFIG.motionBoost; // Boost when close
          }
        }

        this.depth += this.speed * speedMult;

        // Organic wobble (less when tracking)
        const wobbleStrength = motionSources.length > 0 ? 0.1 : 0.25;
        const wobble = Math.sin(this.life * this.wobbleSpeed + this.wobbleOffset) * wobbleStrength;

        // Target angle toward motion
        let targetAngle = wobble;
        if (motionSources.length > 0) {
          const nearest = this.findNearestMotion();
          if (nearest) {
            const dx = nearest.x - this.x;
            const dy = nearest.y - this.y;
            const target = Math.atan2(dy, dx);
            targetAngle = target + wobble * 0.3;
          }
        }

        // Smooth angle transition
        let angleDiff = targetAngle - this.angle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        this.angle += angleDiff * 0.1;

        // Move with speed multiplier
        this.lastX = this.x;
        this.lastY = this.y;
        this.x += Math.cos(this.angle) * this.speed * speedMult;
        this.y += Math.sin(this.angle) * this.speed * speedMult;

        // Random character mutation
        if (Math.random() < 0.08) {
          this.char = this.randomChar('active');
        }

        // Boundary handling
        const margin = 3;
        if (this.x < margin) {
          this.angle = Math.PI - this.angle + (Math.random() - 0.5) * 0.5;
          this.x = margin;
        }
        if (this.x >= CONFIG.cols - margin) {
          this.angle = Math.PI - this.angle + (Math.random() - 0.5) * 0.5;
          this.x = CONFIG.cols - margin - 1;
        }
        if (this.y < margin) {
          this.angle = -this.angle + (Math.random() - 0.5) * 0.5;
          this.y = margin;
        }
        if (this.y >= CONFIG.rows - margin) {
          this.angle = -this.angle + (Math.random() - 0.5) * 0.5;
          this.y = CONFIG.rows - margin - 1;
        }
      }

      // Find nearest motion source
      let nearestMotion = null;
      let nearestDist = Infinity;

      for (const source of motionSources) {
        const dx = source.x - this.x;
        const dy = source.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < nearestDist) {
          nearestDist = dist;
          nearestMotion = source;
        }
      }

      if (nearestMotion) {
        const dx = nearestMotion.x - this.x;
        const dy = nearestMotion.y - this.y;
        const target = Math.atan2(dy, dx);
        targetAngle = target;
      }

      return nearestMotion;
    }

      shouldBranch() {
        return Math.random() < CONFIG.branchProbability &&
               this.depth > 8 &&
               this.depth < 100 &&
               this.life > 20;
      }

      isMature() {
        // Mature faster when tracking motion
        const baseMaturity = 120 + Math.random() * 60;
        if (motionSources.length > 0) {
          return this.depth > baseMaturity * 0.7;
        }
        return this.depth > baseMaturity;
      }
    }

    // ========================================
    // WEBCAM PROCESSOR
    // ========================================
    async function initWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 320 },
            height: { ideal: 240 },
            facingMode: 'user'
          }
        });
        webcamEl.srcObject = stream;
        await webcamEl.play();

        hiddenCanvas = document.createElement('canvas');
        hiddenCanvas.width = 160;
        hiddenCanvas.height = 120;
        hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

        webcamActive = true;
        overlayEl.textContent = 'Move to grow neural fibers';
        toggleBtn.classList.add('active');

        return true;
      } catch (err) {
        overlayEl.textContent = 'Webcam unavailable — try refreshing';
        console.warn('Webcam error:', err);
        return false;
      }
    }

    function processWebcam() {
      if (!webcamActive || !webcamEl.readyState || webcamEl.readyState < 2) return;

      hiddenCtx.drawImage(webcamEl, 0, 0, 160, 120);
      const frame = hiddenCtx.getImageData(0, 0, 160, 120);
      const data = frame.data;

      // Detect motion blocks
      const motionPoints = [];
      const blockSize = 12;

      for (let by = 0; by < 120; by += blockSize) {
        for (let bx = 0; bx < 160; bx += blockSize) {
          let blockMotion = 0;
          let count = 0;

          for (let y = by; y < by + blockSize && y < 120; y++) {
            for (let x = bx; x < bx + blockSize && x < 160; x++) {
              const i = (y * 160 + x) * 4;
              const brightness = (data[i] + data[i + 1] + data[i + 2]) / 3;

              if (motionHistory.length > 0) {
                const histKey = `${x >> 3}-${y >> 3}`;
                const prev = motionHistory[motionHistory.length - 1].get(histKey);
                if (prev !== undefined) {
                  blockMotion += Math.abs(brightness - prev);
                  count++;
                }
              }
            }
          }

          if (count > 0 && blockMotion / count > CONFIG.motionThreshold) {
            motionPoints.push({
              x: bx / 160,
              y: by / 120
            });
          }
        }
      }

      // Store brightness map
      const brightnessMap = new Map();
      for (let y = 0; y < 120; y += 8) {
        for (let x = 0; x < 160; x += 8) {
          const i = (y * 160 + x) * 4;
          const brightness = (data[i] + data[i + 1] + data[i + 2]) / 3;
          brightnessMap.set(`${x >> 3}-${y >> 3}`, brightness);
        }
      }
      motionHistory.push(brightnessMap);
      if (motionHistory.length > CONFIG.motionSmoothingFrames) {
        motionHistory.shift();
      }

      // Convert to canvas coordinates and cluster
      const rawSources = motionPoints.map(pt => ({
        x: pt.x * CONFIG.cols,
        y: pt.y * CONFIG.rows
      }));

      // Cluster nearby points
      if (rawSources.length > 0) {
        const clustered = [];
        const clusterDist = 10;

        for (const source of rawSources) {
          let merged = false;
          for (const cluster of clustered) {
            const dx = source.x - cluster.x;
            const dy = source.y - cluster.y;
            if (Math.sqrt(dx * dx + dy * dy) < clusterDist) {
              cluster.x = cluster.x * 0.7 + source.x * 0.3;
              cluster.y = cluster.y * 0.7 + source.y * 0.3;
              cluster.weight = (cluster.weight || 1) + 1;
              merged = true;
              break;
            }
          }
          if (!merged) {
            clustered.push({ x: source.x, y: source.y, weight: 1 });
          }
        }

        motionSources = clustered
          .sort((a, b) => b.weight - a.weight)
          .slice(0, 6);
      } else {
        motionSources = [];
      }
    }

    // ========================================
    // NEURAL NETWORK
    // ========================================
    function initNetwork() {
      const cx = CONFIG.cols / 2;
      const cy = CONFIG.rows / 2;

      // Create root nodes in a triangle formation
      const roots = [
        [cx, cy],
        [cx - 15, cy - 8],
        [cx + 15, cy - 8],
        [cx - 8, cy + 12],
        [cx + 8, cy + 12]
      ];

      for (const [x, y] of roots) {
        nodes.push(new Node(x, y, true));
      }

      // Initial growth tips
      const angles = [0, Math.PI * 0.4, Math.PI * 0.8, Math.PI * 1.2, Math.PI * 1.6];
      for (let i = 0; i < angles.length; i++) {
        tips.push(new Tip(roots[i % roots.length][0], roots[i % roots.length][1], angles[i]));
      }
    }

    function updateNetwork() {
      // Update nodes
      for (const node of nodes) {
        node.update();
      }

      // Process tips
      for (let i = tips.length - 1; i >= 0; i--) {
        const tip = tips[i];

        // Convert mature tips to nodes
        if (tip.isMature()) {
          const node = new Node(Math.round(tip.x), Math.round(tip.y));
          nodes.push(node);
          tips.splice(i, 1);
          continue;
        }

        // Branching
        if (tip.shouldBranch() && tips.length < CONFIG.maxTips) {
          const branchAngle = tip.angle + (Math.random() > 0.5 ? 0.6 : -0.6);
          tips.push(new Tip(tip.x, tip.y, branchAngle, 0));
        }

        // Tip-to-tip connections
        for (let j = i + 1; j < tips.length; j++) {
          const other = tips[j];
          const dx = tip.x - other.x;
          const dy = tip.y - other.y;
          if (Math.sqrt(dx * dx + dy * dy) < 2.5) {
            const node = new Node((tip.x + other.x) / 2, (tip.y + other.y) / 2);
            node.char = CHARS.junction[Math.floor(Math.random() * CHARS.junction.length)];
            nodes.push(node);
            tips.splice(i, 1);
            tips.splice(j - 1, 1);
            break;
          }
        }

        tip.update();
      }

      // Spawn new tips from motion
      if (motionSources.length > 0 && tips.length < CONFIG.maxTips) {
        for (const source of motionSources) {
          // Find nearest node
          let closestNode = null;
          let closestDist = Infinity;

          for (const node of nodes) {
            const dx = node.x - source.x;
            const dy = node.y - source.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < closestDist) {
              closestDist = dist;
              closestNode = node;
            }
          }

          // Spawn from nearest node
          if (closestNode && closestDist > 4) {
            const angle = Math.atan2(source.y - closestNode.y, source.x - closestNode.x);
            if (Math.random() < 0.12) {
              tips.push(new Tip(closestNode.x, closestNode.y, angle));
            }
          }

          // Also spawn from existing tips reaching toward motion
          for (const tip of tips) {
            const dx = source.x - tip.x;
            const dy = source.y - tip.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 12 && Math.random() < 0.06) {
              tips.push(new Tip(tip.x, tip.y, Math.atan2(dy, dx)));
            }
          }
        }
      }

      // Ambient growth when no motion
      if (motionSources.length === 0 && tips.length < 6 && Math.random() < CONFIG.ambientDrift) {
        if (nodes.length > 0) {
          const node = nodes[Math.floor(Math.random() * nodes.length)];
          tips.push(new Tip(node.x, node.y, Math.random() * Math.PI * 2));
        }
      }

      // Prune old nodes
      while (nodes.length > CONFIG.maxNodes) {
        let oldestIdx = -1;
        let oldestAge = 0;
        for (let i = 0; i < nodes.length; i++) {
          if (!nodes[i].isRoot && nodes[i].dormantFrames > 60) {
            if (nodes[i].age > oldestAge) {
              oldestAge = nodes[i].age;
              oldestIdx = i;
            }
          }
        }
        if (oldestIdx >= 0) {
          nodes.splice(oldestIdx, 1);
        } else {
          break;
        }
      }
    }

    // ========================================
    // RENDERING
    // ========================================
    function render() {
      const grid = [];
      for (let y = 0; y < CONFIG.rows; y++) {
        grid[y] = [];
        for (let x = 0; x < CONFIG.cols; x++) {
          grid[y][x] = { char: ' ', opacity: 0 };
        }
      }

      // Place nodes
      for (const node of nodes) {
        const x = Math.round(node.x);
        const y = Math.round(node.y);
        if (x >= 0 && x < CONFIG.cols && y >= 0 && y < CONFIG.rows) {
          const existing = grid[y][x];
          if (existing.opacity < node.opacity || existing.char === ' ') {
            grid[y][x] = { char: node.char, opacity: node.opacity };
          }
        }
      }

      // Place tips with trails
      for (const tip of tips) {
        // Draw trail
        for (const t of tip.trail) {
          const tx = Math.round(t.x);
          const ty = Math.round(t.y);
          if (tx >= 0 && tx < CONFIG.cols && ty >= 0 && ty < CONFIG.rows) {
            const fade = Math.max(0.1, 1 - t.age / 25);
            if (grid[ty][tx].char === ' ') {
              const trailChars = CHARS.trail;
              grid[ty][tx] = { char: trailChars[Math.min(t.age % trailChars.length, trailChars.length - 1)], opacity: fade * 0.6 };
            }
          }
        }

        const x = Math.round(tip.x);
        const y = Math.round(tip.y);
        if (x >= 0 && x < CONFIG.cols && y >= 0 && y < CONFIG.rows) {
          grid[y][x] = { char: tip.char, opacity: 1 };
        }
      }

      // Build HTML
      let html = '';
      for (let y = 0; y < CONFIG.rows; y++) {
        for (let x = 0; x < CONFIG.cols; x++) {
          const cell = grid[y][x];
          let gray = Math.round(30 + cell.opacity * 70);
          // Make active tips darker/black
          if (cell.char === '@' || cell.char === '#' || cell.char === '█') {
            gray = 0;
          }
          html += `<span style="color: hsl(0, 0%, ${gray}%)">${cell.char}</span>`;
        }
        html += '\n';
      }

      canvasEl.innerHTML = html;
    }

    // ========================================
    // ANIMATION LOOP
    // ========================================
    function animate() {
      frameCount++;

      if (frameCount % 2 === 0) {
        processWebcam();
      }

      updateNetwork();
      render();

      requestAnimationFrame(animate);
    }

    // ========================================
    // RESIZE
    // ========================================
    function handleResize() {
      const charWidth = canvasEl.clientWidth / CONFIG.cols;
      const charHeight = canvasEl.clientHeight / CONFIG.rows;
      const fontSize = Math.min(charWidth, charHeight * 1.3);
      canvasEl.style.fontSize = `${fontSize}px`;
    }

    window.addEventListener('resize', handleResize);

    // ========================================
    // INIT
    // ========================================
    async function init() {
      initNetwork();
      handleResize();
      await initWebcam();
      animate();
    }

    init();
  </script>
</body>
</html>
