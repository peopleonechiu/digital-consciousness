<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Consciousness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: 'Courier New', Consolas, monospace;
    }
    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      white-space: pre;
      line-height: 1.15;
      font-size: clamp(9px, 1.1vw, 13px);
      color: #000;
      user-select: none;
    }
    #webcam-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 200px;
      border: 2px solid #000;
      background: #000;
      z-index: 1000;
    }
    #webcam-container.hidden { display: none; }
    #webcam, #debug-canvas {
      width: 100%;
      height: auto;
      display: block;
    }
    #debug-canvas {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0.6;
    }
    #toggle-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      background: #fff;
      border: 2px solid #000;
      cursor: pointer;
      font-size: 16px;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #toggle-btn.active { background: #000; color: #fff; }
    #overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 12px;
      color: #333;
      background: rgba(255,255,255,0.9);
      padding: 8px 14px;
      border: 1px solid #ccc;
      z-index: 100;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div id="overlay">Initializing...</div>
  <button id="toggle-btn">📷</button>
  <div id="webcam-container" class="hidden">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="debug-canvas"></canvas>
  </div>
  <div id="canvas"></div>

  <script>
    // =============================================
    // CONFIG
    // =============================================
    const CFG = {
      cols: 110,
      rows: 58,
      baseSpeed: 0.25,
      trackSpeed: 0.8,
      turnRate: 0.06,
      wobble: 0.04,
      branchProb: 0.02,
      maxFibers: 12,
      maxNodes: 80,
      trailLen: 30,
      motionThresh: 18,
      motionBlock: 12,
      camWidth: 120,
      camHeight: 90
    };

    // Raw ASCII only - contemporary art aesthetic
    const C = {
      tip: ['@', '#', '*'],
      node: ['+', 'x', 'o'],
      line: ['-', '|', '+'],
      trail: ['.', '`', '\'', '"']
    };

    // =============================================
    // STATE
    // =============================================
    let fibers = [];
    let nodes = [];
    let connections = [];
    let motionTarget = null;
    let motionActivity = 0;
    let webcamReady = false;
    let lastFrame = null;
    let hiddenCanvas, hiddenCtx, debugCanvas, debugCtx;

    // =============================================
    // DOM
    // =============================================
    const canvas = document.getElementById('canvas');
    const webcam = document.getElementById('webcam');
    const overlay = document.getElementById('overlay');
    const toggleBtn = document.getElementById('toggle-btn');
    const webcamContainer = document.getElementById('webcam-container');
    const debugCanvasEl = document.getElementById('debug-canvas');

    // =============================================
    // WEBCAM
    // =============================================
    toggleBtn.addEventListener('click', () => {
      webcamContainer.classList.toggle('hidden');
      toggleBtn.classList.toggle('active');
    });

    async function initWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 160, height: 120 }
        });
        webcam.srcObject = stream;
        await webcam.play();

        hiddenCanvas = document.createElement('canvas');
        hiddenCanvas.width = CFG.camWidth;
        hiddenCanvas.height = CFG.camHeight;
        hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

        debugCanvas = debugCanvasEl;
        debugCanvas.width = 160;
        debugCanvas.height = 120;
        debugCtx = debugCanvas.getContext('2d');

        webcamReady = true;
        overlay.textContent = 'Webcam active - move slowly';
        toggleBtn.classList.add('active');
        return true;
      } catch (e) {
        overlay.textContent = 'No webcam - ambient mode';
        console.warn(e);
        return false;
      }
    }

    // =============================================
    // MOTION DETECTION
    // =============================================
    function detectMotion() {
      if (!webcamReady || webcam.readyState < 2) return;

      // Capture frame
      hiddenCtx.drawImage(webcam, 0, 0, CFG.camWidth, CFG.camHeight);
      const frame = hiddenCtx.getImageData(0, 0, CFG.camWidth, CFG.camHeight);
      const data = frame.data;

      if (!lastFrame) {
        lastFrame = new Uint8Array(data.length);
        lastFrame.set(data);
        return;
      }

      // Find motion blocks
      let totalMotion = 0;
      let sumX = 0, sumY = 0, count = 0;
      const motionBlocks = [];

      for (let by = 0; by < CFG.camHeight; by += CFG.motionBlock) {
        for (let bx = 0; bx < CFG.camWidth; bx += CFG.motionBlock) {
          let blockDiff = 0;

          for (let y = by; y < by + CFG.motionBlock && y < CFG.camHeight; y++) {
            for (let x = bx; x < bx + CFG.motionBlock && x < CFG.camWidth; x++) {
              const i = (y * CFG.camWidth + x) * 4;
              blockDiff += Math.abs(data[i] - lastFrame[i]);
              blockDiff += Math.abs(data[i+1] - lastFrame[i+1]);
              blockDiff += Math.abs(data[i+2] - lastFrame[i+2]);
            }
          }

          if (blockDiff > CFG.motionThresh * 3) {
            motionBlocks.push({ x: bx, y: by, d: blockDiff });
            totalMotion += blockDiff;
            sumX += bx * blockDiff;
            sumY += by * blockDiff;
            count++;
          }
        }
      }

      lastFrame.set(data);

      // Draw debug view
      if (debugCtx && !webcamContainer.classList.contains('hidden')) {
        debugCtx.clearRect(0, 0, 160, 120);
        for (const b of motionBlocks) {
          debugCtx.fillStyle = `rgba(255,0,0,${Math.min(1, b.d / 500)})`;
          debugCtx.fillRect(b.x, b.y, CFG.motionBlock, CFG.motionBlock);
        }
        if (motionTarget) {
          const tx = motionTarget.x / CFG.cols * 160;
          const ty = motionTarget.y / CFG.rows * 120;
          debugCtx.strokeStyle = 'lime';
          debugCtx.lineWidth = 2;
          debugCtx.beginPath();
          debugCtx.arc(tx, ty, 8, 0, Math.PI * 2);
          debugCtx.stroke();
        }
      }

      // Update motion target
      if (totalMotion > 0 && count > 0) {
        const tx = (sumX / totalMotion) / CFG.camWidth * CFG.cols;
        const ty = (sumY / totalMotion) / CFG.camHeight * CFG.rows;

        if (motionTarget) {
          motionTarget.x += (tx - motionTarget.x) * 0.4;
          motionTarget.y += (ty - motionTarget.y) * 0.4;
        } else {
          motionTarget = { x: tx, y: ty };
        }

        motionActivity = Math.min(1, motionActivity + 0.2);
      } else {
        motionActivity = Math.max(0, motionActivity - 0.015);
      }
    }

    // =============================================
    // FIBER (growing tip)
    // =============================================
    class Fiber {
      constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.speed = CFG.baseSpeed;
        this.trail = [];
        this.age = 0;
        this.energy = 0.3;
      }

      update() {
        this.age++;
        this.energy = Math.min(1, this.energy + 0.002);

        // Trail
        this.trail.push({ x: this.x, y: this.y, age: 0 });
        if (this.trail.length > CFG.trailLen) this.trail.shift();
        for (const t of this.trail) t.age++;

        // Speed: slow by default, faster when tracking
        let targetSpeed = CFG.baseSpeed;
        if (motionTarget && motionActivity > 0.1) {
          const dx = motionTarget.x - this.x;
          const dy = motionTarget.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          targetSpeed = CFG.trackSpeed * Math.max(0.3, 1 - dist / 40);
          this.energy = Math.min(1, this.energy + 0.01);
        }
        this.speed += (targetSpeed - this.speed) * 0.03;

        // Turn toward motion
        if (motionTarget && motionActivity > 0.05) {
          const dx = motionTarget.x - this.x;
          const dy = motionTarget.y - this.y;
          const target = Math.atan2(dy, dx);
          let diff = target - this.angle;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          this.angle += diff * CFG.turnRate * this.energy;
        }

        // Organic wobble
        this.angle += Math.sin(this.age * 0.05) * CFG.wobble * 0.3;

        // Move
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Boundary - elastic bounce
        const m = 4;
        if (this.x < m) { this.x = m; this.angle = Math.PI - this.angle; }
        if (this.x > CFG.cols - m) { this.x = CFG.cols - m; this.angle = Math.PI - this.angle; }
        if (this.y < m) { this.y = m; this.angle = -this.angle; }
        if (this.y > CFG.rows - m) { this.y = CFG.rows - m; this.angle = -this.angle; }

        // Occasional branch
        if (this.age > 150 && this.age % 300 === 0 && fibers.length < CFG.maxFibers && Math.random() < CFG.branchProb * 15) {
          const bAngle = this.angle + (Math.random() > 0.5 ? 0.6 : -0.6);
          fibers.push(new Fiber(this.x, this.y, bAngle));
        }
      }
    }

    // =============================================
    // NODE
    // =============================================
    class Node {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.opacity = 0.7;
        this.char = C.node[Math.floor(Math.random() * C.node.length)];
      }
    }

    // =============================================
    // UPDATE
    // =============================================
    function update() {
      detectMotion();

      // Update fibers
      for (let i = fibers.length - 1; i >= 0; i--) {
        fibers[i].update();
      }

      // Spawn fiber from nearest node toward motion
      if (motionTarget && motionActivity > 0.4 && fibers.length < CFG.maxFibers) {
        if (Math.random() < 0.03) {
          if (nodes.length > 0) {
            // Find node nearest to motion
            let best = null, bestDist = Infinity;
            for (const n of nodes) {
              const dx = n.x - motionTarget.x;
              const dy = n.y - motionTarget.y;
              const d = Math.sqrt(dx*dx + dy*dy);
              if (d < bestDist) { bestDist = d; best = n; }
            }
            if (best) {
              const angle = Math.atan2(motionTarget.y - best.y, motionTarget.x - best.x);
              fibers.push(new Fiber(best.x, best.y, angle));
            }
          }
        }
      }

      // Convert old fibers to nodes
      for (let i = fibers.length - 1; i >= 0; i--) {
        if (fibers[i].age > 600 + Math.random() * 400) {
          nodes.push(new Node(fibers[i].x, fibers[i].y));
          if (fibers.length > 4) fibers.splice(i, 1);
        }
      }

      // Connect fibers to nearby nodes
      for (const f of fibers) {
        for (const n of nodes) {
          const dx = f.x - n.x;
          const dy = f.y - n.y;
          if (Math.sqrt(dx*dx + dy*dy) < 6) {
            connections.push({
              x1: n.x, y1: n.y, x2: f.x, y2: f.y, age: 0
            });
          }
        }
      }

      // Age connections
      for (let i = connections.length - 1; i >= 0; i--) {
        connections[i].age++;
        if (connections[i].age > 400) connections.splice(i, 1);
      }

      // Limit nodes
      while (nodes.length > CFG.maxNodes) {
        nodes.shift();
      }
    }

    // =============================================
    // RENDER
    // =============================================
    function render() {
      const grid = [];
      for (let y = 0; y < CFG.rows; y++) {
        grid[y] = [];
        for (let x = 0; x < CFG.cols; x++) {
          grid[y][x] = { c: ' ', o: 0 };
        }
      }

      // Connections as simple lines
      for (const conn of connections) {
        const x1 = Math.round(conn.x1), y1 = Math.round(conn.y1);
        const x2 = Math.round(conn.x2), y2 = Math.round(conn.y2);
        const opacity = Math.max(0.1, 0.6 - conn.age * 0.001);

        // Bresenham-style line
        const dx = Math.abs(x2-x1), dy = Math.abs(y2-y1);
        const sx = x1 < x2 ? 1 : -1, sy = y1 < y2 ? 1 : -1;
        let err = dx - dy;
        let x = x1, y = y1;

        while (true) {
          if (y >= 0 && y < CFG.rows && x >= 0 && x < CFG.cols) {
            const char = dx > dy ? '-' : '|';
            grid[y][x] = { c: char, o: opacity };
          }
          if (x === x2 && y === y2) break;
          const e2 = 2 * err;
          if (e2 > -dy) { err -= dy; x += sx; }
          if (e2 < dx) { err += dx; y += sy; }
        }
      }

      // Trails
      for (const f of fibers) {
        for (const t of f.trail) {
          const x = Math.round(t.x);
          const y = Math.round(t.y);
          if (y >= 0 && y < CFG.rows && x >= 0 && x < CFG.cols) {
            const fade = 1 - t.age / CFG.trailLen;
            if (grid[y][x].o < fade * 0.4) {
              const ci = Math.min(Math.floor(t.age / 8), C.trail.length - 1);
              grid[y][x] = { c: C.trail[ci], o: fade * 0.35 };
            }
          }
        }
      }

      // Nodes
      for (const n of nodes) {
        const x = Math.round(n.x);
        const y = Math.round(n.y);
        if (y >= 0 && y < CFG.rows && x >= 0 && x < CFG.cols) {
          grid[y][x] = { c: n.char, o: n.opacity };
        }
      }

      // Fiber tips (always on top)
      for (const f of fibers) {
        const x = Math.round(f.x);
        const y = Math.round(f.y);
        if (y >= 0 && y < CFG.rows && x >= 0 && x < CFG.cols) {
          const ci = f.age % C.tip.length;
          const intensity = f.energy > 0.7 ? '#' : f.energy > 0.4 ? '*' : '@';
          grid[y][x] = { c: intensity, o: 1 };
        }
      }

      // Motion target indicator
      if (motionTarget && motionActivity > 0.1) {
        const x = Math.round(motionTarget.x);
        const y = Math.round(motionTarget.y);
        if (y >= 0 && y < CFG.rows && x >= 0 && x < CFG.cols) {
          grid[y][x] = { c: 'O', o: motionActivity * 0.8 };
        }
      }

      // Build HTML
      let html = '';
      for (let y = 0; y < CFG.rows; y++) {
        for (let x = 0; x < CFG.cols; x++) {
          const cell = grid[y][x];
          const g = Math.round(20 + cell.o * 70);
          const w = cell.c === '@' || cell.c === '#' ? 'font-weight:bold;' : '';
          html += `<span style="color:hsl(0,0%,${g}%);${w}">${cell.c}</span>`;
        }
        html += '\n';
      }
      canvas.innerHTML = html;
    }

    // =============================================
    // LOOP
    // =============================================
    function animate() {
      update();
      render();
      requestAnimationFrame(animate);
    }

    function handleResize() {
      const w = canvas.clientWidth / CFG.cols;
      const h = canvas.clientHeight / CFG.rows;
      canvas.style.fontSize = `${Math.min(w, h * 1.25)}px`;
    }
    window.addEventListener('resize', handleResize);

    // =============================================
    // INIT
    // =============================================
    function init() {
      const cx = CFG.cols / 2;
      const cy = CFG.rows / 2;
      const angles = [0, Math.PI*0.4, Math.PI*0.8, Math.PI*1.2, Math.PI*1.6];
      for (const a of angles) {
        fibers.push(new Fiber(cx, cy, a));
      }

      handleResize();
      initWebcam();
      animate();
    }

    init();
  </script>
</body>
</html>
