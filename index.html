<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Consciousness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: 'Courier New', Consolas, monospace;
    }
    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      white-space: pre;
      line-height: 1.15;
      font-size: clamp(9px, 1.1vw, 13px);
      color: #000;
      user-select: none;
    }
    #webcam-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 220px;
      border: 2px solid #000;
      background: #000;
      z-index: 1000;
    }
    #webcam-container.hidden { display: none; }
    #webcam, #face-canvas {
      width: 100%;
      height: auto;
      display: block;
    }
    #face-canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
    #toggle-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      background: #fff;
      border: 2px solid #000;
      cursor: pointer;
      font-size: 16px;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #toggle-btn.active { background: #000; color: #fff; }
    #overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 12px;
      color: #333;
      background: rgba(255,255,255,0.9);
      padding: 8px 14px;
      border: 1px solid #ccc;
      z-index: 100;
      font-family: 'Courier New', monospace;
    }
    #model-status {
      color: #0066cc;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div>Loading face detection model...</div>
    <div id="model-status"></div>
  </div>
  <button id="toggle-btn">📷</button>
  <div id="webcam-container" class="hidden">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="face-canvas"></canvas>
  </div>
  <div id="canvas"></div>

  <!-- Face-api.js from CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <script>
    // =============================================
    // CONFIG
    // =============================================
    const CFG = {
      cols: 110,
      rows: 58,
      baseSpeed: 0.2,
      trackSpeed: 0.7,
      turnRate: 0.05,
      wobble: 0.03,
      branchProb: 0.015,
      maxFibers: 20,
      maxNodes: 100,
      trailLen: 35,
      faceMatchDist: 15
    };

    // Raw ASCII - contemporary art
    const C = {
      tip: ['@', '#', '*'],
      node: ['+', 'x', 'o'],
      trail: ['.', '`']
    };

    // =============================================
    // STATE
    // =============================================
    let fibers = [];
    let nodes = [];
    let connections = [];
    let faces = [];           // Tracked faces
    let knownFaces = [];      // Previous face positions for matching
    let webcamReady = false;
    let modelLoaded = false;
    let lastFaceUpdate = 0;
    let faceCanvas, faceCtx;

    // =============================================
    // DOM
    // =============================================
    const canvas = document.getElementById('canvas');
    const webcam = document.getElementById('webcam');
    const overlay = document.getElementById('overlay');
    const toggleBtn = document.getElementById('toggle-btn');
    const webcamContainer = document.getElementById('webcam-container');
    const faceCanvasEl = document.getElementById('face-canvas');
    const modelStatus = document.getElementById('model-status');

    // =============================================
    // WEBCAM
    // =============================================
    toggleBtn.addEventListener('click', () => {
      webcamContainer.classList.toggle('hidden');
      toggleBtn.classList.toggle('active');
    });

    async function initWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 640, height: 480 }
        });
        webcam.srcObject = stream;
        await webcam.play();

        faceCanvas = faceCanvasEl;
        faceCanvas.width = webcam.videoWidth || 640;
        faceCanvas.height = webcam.videoHeight || 480;
        faceCtx = faceCanvas.getContext('2d');

        webcamReady = true;
        toggleBtn.classList.add('active');
        return true;
      } catch (e) {
        console.warn(e);
        return false;
      }
    }

    // =============================================
    // FACE DETECTION (face-api.js / TensorFlow.js)
    // =============================================
    async function loadModels() {
      try {
        modelStatus.textContent = 'Loading tinyFaceDetect model...';
        await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model/');
        modelLoaded = true;
        modelStatus.textContent = 'Model loaded!';
        overlay.querySelector('div').textContent = 'Face tracking active';
        setTimeout(() => { overlay.style.display = 'none'; }, 2000);
      } catch (e) {
        console.error('Model load failed:', e);
        modelStatus.textContent = 'Model load failed: ' + e.message;
      }
    }

    async function detectFaces() {
      if (!webcamReady || !modelLoaded || !webcam.readyState) return;

      const now = Date.now();
      if (now - lastFaceUpdate < 80) return;  // ~12 fps face detection
      lastFaceUpdate = now;

      try {
        const detections = await faceapi.detectAllFaces(webcam, new faceapi.TinyFaceDetectorOptions({
          inputSize: 320,
          scoreThreshold: 0.5
        }));

        const newFaces = detections.map(d => {
          const box = d.box;
          return {
            x: (box.x + box.width / 2) / webcam.videoWidth * CFG.cols,
            y: (box.y + box.height / 2) / webcam.videoHeight * CFG.rows,
            width: box.width / webcam.videoWidth * CFG.cols,
            height: box.height / webcam.videoHeight * CFG.rows,
            id: null
          };
        });

        // Match to known faces (simple distance-based)
        for (const nf of newFaces) {
          let bestMatch = null, bestDist = Infinity;
          for (const kf of knownFaces) {
            const dx = nf.x - kf.x;
            const dy = nf.y - kf.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < bestDist && dist < CFG.faceMatchDist) {
              bestDist = dist;
              bestMatch = kf;
            }
          }
          if (bestMatch) {
            nf.id = bestMatch.id;
            bestMatch.x = nf.x;
            bestMatch.y = nf.y;
          } else {
            nf.id = Math.random().toString(36).substr(2, 9);
            knownFaces.push(nf);
          }
        }

        // Remove stale known faces
        knownFaces = newFaces;

        faces = newFaces;

        // Draw face boxes on debug canvas
        if (faceCtx && !webcamContainer.classList.contains('hidden')) {
          faceCtx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);
          for (const f of faces) {
            faceCtx.strokeStyle = '#00ff00';
            faceCtx.lineWidth = 2;
            const sx = faceCanvas.width / CFG.cols;
            const sy = faceCanvas.height / CFG.rows;
            faceCtx.strokeRect(
              (f.x - f.width/2) * sx,
              (f.y - f.height/2) * sy,
              f.width * sx,
              f.height * sy
            );
            faceCtx.fillStyle = '#00ff00';
            faceCtx.font = '12px Courier';
            faceCtx.fillText(`Face ${f.id.substr(0,4)}`, (f.x - f.width/2) * sx, (f.y - f.height/2) * sy - 5);
          }
        }

      } catch (e) {
        console.warn('Face detection error:', e);
      }
    }

    // =============================================
    // FIBER
    // =============================================
    class Fiber {
      constructor(x, y, angle, targetId = null) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.speed = CFG.baseSpeed;
        this.trail = [];
        this.age = 0;
        this.energy = 0.3;
        this.targetId = targetId;  // Which face this fiber follows
      }

      findTarget() {
        if (!faces.length) return null;

        // If has targetId, follow that face
        if (this.targetId) {
          const target = faces.find(f => f.id === this.targetId);
          if (target) return target;
        }

        // Otherwise follow nearest face
        let best = null, bestDist = Infinity;
        for (const f of faces) {
          const dx = f.x - this.x;
          const dy = f.y - this.y;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < bestDist) { bestDist = d; best = f; }
        }
        return best;
      }

      update() {
        this.age++;
        this.energy = Math.min(1, this.energy + 0.001);

        // Trail
        this.trail.push({ x: this.x, y: this.y, age: 0 });
        if (this.trail.length > CFG.trailLen) this.trail.shift();
        for (const t of this.trail) t.age++;

        // Target
        const target = this.findTarget();
        let targetSpeed = CFG.baseSpeed;

        if (target) {
          const dx = target.x - this.x;
          const dy = target.y - this.y;
          const dist = Math.sqrt(dx*dx + dy*dy);

          targetSpeed = CFG.trackSpeed * Math.max(0.4, 1 - dist / 50);
          this.energy = Math.min(1, this.energy + 0.015);

          // Turn toward face
          const desiredAngle = Math.atan2(dy, dx);
          let diff = desiredAngle - this.angle;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          this.angle += diff * CFG.turnRate * this.energy;
        }

        this.speed += (targetSpeed - this.speed) * 0.03;

        // Wobble
        this.angle += Math.sin(this.age * 0.04) * CFG.wobble * 0.2;

        // Move
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Boundary
        const m = 5;
        if (this.x < m) { this.x = m; this.angle = Math.PI - this.angle; }
        if (this.x > CFG.cols - m) { this.x = CFG.cols - m; this.angle = Math.PI - this.angle; }
        if (this.y < m) { this.y = m; this.angle = -this.angle; }
        if (this.y > CFG.rows - m) { this.y = CFG.rows - m; this.angle = -this.angle; }

        // Branch
        if (this.age > 200 && this.age % 250 === 0 && fibers.length < CFG.maxFibers && Math.random() < CFG.branchProb * 12) {
          const bAngle = this.angle + (Math.random() > 0.5 ? 0.5 : -0.5);
          fibers.push(new Fiber(this.x, this.y, bAngle, this.targetId));
        }
      }
    }

    // =============================================
    // NODE
    // =============================================
    class Node {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.opacity = 0.7;
        this.char = C.node[Math.floor(Math.random() * C.node.length)];
      }
    }

    // =============================================
    // UPDATE
    // =============================================
    function update() {
      detectFaces();

      // Update fibers
      for (const f of fibers) {
        f.update();
      }

      // Spawn new fibers for new faces
      const faceIds = new Set(faces.map(f => f.id));
      const fiberTargets = new Set(fibers.map(f => f.targetId).filter(Boolean));

      for (const face of faces) {
        // If no fiber is tracking this face, spawn one
        if (!fiberTargets.has(face.id)) {
          // Find nearest existing node
          let best = null, bestDist = Infinity;
          for (const n of nodes) {
            const dx = n.x - face.x;
            const dy = n.y - face.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d < bestDist) { bestDist = d; best = n; }
          }

          const angle = best ?
            Math.atan2(face.y - best.y, face.x - best.x) :
            Math.random() * Math.PI * 2;

          fibers.push(new Fiber(best ? best.x : CFG.cols/2, best ? best.y : CFG.rows/2, angle, face.id));
        }
      }

      // Mature old fibers to nodes
      for (let i = fibers.length - 1; i >= 0; i--) {
        if (fibers[i].age > 500 + Math.random() * 500) {
          nodes.push(new Node(fibers[i].x, fibers[i].y));
          if (fibers.length > 6) fibers.splice(i, 1);
        }
      }

      // Connect fibers to nearby nodes
      for (const f of fibers) {
        for (const n of nodes) {
          const dx = f.x - n.x, dy = f.y - n.y;
          if (Math.sqrt(dx*dx + dy*dy) < 5) {
            connections.push({ x1: n.x, y1: n.y, x2: f.x, y2: f.y, age: 0 });
          }
        }
      }

      // Age connections
      for (let i = connections.length - 1; i >= 0; i--) {
        connections[i].age++;
        if (connections[i].age > 500) connections.splice(i, 1);
      }

      while (nodes.length > CFG.maxNodes) nodes.shift();
    }

    // =============================================
    // RENDER
    // =============================================
    function render() {
      const grid = [];
      for (let y = 0; y < CFG.rows; y++) {
        grid[y] = [];
        for (let x = 0; x < CFG.cols; x++) {
          grid[y][x] = { c: ' ', o: 0 };
        }
      }

      // Connections
      for (const conn of connections) {
        const x1 = Math.round(conn.x1), y1 = Math.round(conn.y1);
        const x2 = Math.round(conn.x2), y2 = Math.round(conn.y2);
        const opacity = Math.max(0.1, 0.5 - conn.age * 0.001);

        const dx = Math.abs(x2-x1), dy = Math.abs(y2-y1);
        const sx = x1 < x2 ? 1 : -1, sy = y1 < y2 ? 1 : -1;
        let err = dx - dy;
        let x = x1, y = y1;

        while (true) {
          if (y >= 0 && y < CFG.rows && x >= 0 && x < CFG.cols) {
            grid[y][x] = { c: dx > dy ? '-' : '|', o: opacity };
          }
          if (x === x2 && y === y2) break;
          const e2 = 2 * err;
          if (e2 > -dy) err -= dy, x += sx;
          if (e2 < dx) err += dx, y += sy;
        }
      }

      // Trails
      for (const f of fibers) {
        for (const t of f.trail) {
          const x = Math.round(t.x), y = Math.round(t.y);
          if (y >= 0 && y < CFG.rows && x >= 0 && x < CFG.cols) {
            const fade = 1 - t.age / CFG.trailLen;
            if (grid[y][x].o < fade * 0.3) {
              grid[y][x] = { c: C.trail[Math.min(Math.floor(t.age/10), 1)], o: fade * 0.3 };
            }
          }
        }
      }

      // Nodes
      for (const n of nodes) {
        const x = Math.round(n.x), y = Math.round(n.y);
        if (y >= 0 && y < CFG.rows && x >= 0 && x < CFG.cols) {
          grid[y][x] = { c: n.char, o: n.opacity };
        }
      }

      // Fiber tips
      for (const f of fibers) {
        const x = Math.round(f.x), y = Math.round(f.y);
        if (y >= 0 && y < CFG.rows && x >= 0 && x < CFG.cols) {
          const ci = f.age % C.tip.length;
          grid[y][x] = { c: C.tip[ci], o: 1 };
        }
      }

      // Face indicators
      for (const face of faces) {
        const x = Math.round(face.x), y = Math.round(face.y);
        if (y >= 0 && y < CFG.rows && x >= 0 && x < CFG.cols) {
          grid[y][x] = { c: 'O', o: 0.9 };
        }
      }

      // Build HTML
      let html = '';
      for (let y = 0; y < CFG.rows; y++) {
        for (let x = 0; x < CFG.cols; x++) {
          const cell = grid[y][x];
          const g = Math.round(20 + cell.o * 70);
          const w = cell.c === '@' || c === '#' ? 'font-weight:bold;' : '';
          html += `<span style="color:hsl(0,0%,${g}%);${w}">${cell.c}</span>`;
        }
        html += '\n';
      }
      canvas.innerHTML = html;
    }

    // =============================================
    // LOOP
    // =============================================
    function animate() {
      update();
      render();
      requestAnimationFrame(animate);
    }

    function handleResize() {
      const w = canvas.clientWidth / CFG.cols;
      const h = canvas.clientHeight / CFG.rows;
      canvas.style.fontSize = `${Math.min(w, h * 1.25)}px`;
    }
    window.addEventListener('resize', handleResize);

    // =============================================
    // INIT
    // =============================================
    async function init() {
      const cx = CFG.cols / 2, cy = CFG.rows / 2;
      const angles = [0, Math.PI*0.5, Math.PI, Math.PI*1.5, Math.PI*1.25, Math.PI*0.75];
      for (const a of angles) {
        fibers.push(new Fiber(cx, cy, a));
      }

      handleResize();
      await initWebcam();
      loadModels();
      animate();
    }

    init();
  </script>
</body>
</html>
